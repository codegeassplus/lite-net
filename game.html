<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألعاب شبكة البرق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;              /* أسود داكن جداً */
            color: #ffffff;
            font-family: "Cairo", sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            /* تدرج ذهبي للنص */
            background: linear-gradient(to bottom, #FFD700 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .subtitle {
            font-size: 1.4rem;
            color: #d1d1d1;
            margin-bottom: 50px;
            max-width: 600px;
            line-height: 1.6;
        }

        .subtitle span {
            color: #D4AF37; /* تمييز كلمة شبكة البرق بالذهبي */
            font-weight: bold;
        }

        button {
            padding: 18px 60px;
            font-size: 1.4rem;
            /* تدرج ذهبي ملكي للزر */
            background: linear-gradient(135deg, #D4AF37, #996515);
            color: #000000; /* نص أسود فوق الذهبي للوضوح */
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(212, 175, 55, 0.4);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #FFD700, #D4AF37);
        }

        button:active {
            transform: translateY(2px);
        }

        /* توهج خلفي ذهبي */
        .glow {
            position: absolute;
            top: 40%;
            left: 50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
        }

        /* خط زخرفي ذهبي تحت العنوان */
        .divider {
            width: 80px;
            height: 4px;
            background: #D4AF37;
            margin: 0 auto 40px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <h1>ألعاب</h1>
    <div class="divider"></div>
    
 

    <button onclick="window.open('https://quenq.com/apps/vice-city/#google_vignette', '_blank')">
        العب الآن
    </button>

</body>
</html>
